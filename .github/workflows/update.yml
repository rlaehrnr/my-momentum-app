name: Monthly Momentum Data Auto-Update

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  update-data:
    runs-on: ubuntu-latest
    # ⭐ [핵심 추가] 로봇에게 저장소에 파일을 쓸 수 있는 권한을 명시적으로 부여합니다.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas finance-datareader openpyxl pyarrow requests 

      - name: Run update script
        run: |
          python update_data.py
          python update_data_us.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          
          # 변경사항이 있을 때만 실행
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update momentum data and add to archive"
            # 최신 코드와 합치기
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
