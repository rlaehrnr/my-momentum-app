name: Monthly Momentum Data Auto-Update

on:
  schedule:
    - cron: '0 0 1 * *'  # 매월 1일 00:00 (UTC)
  workflow_dispatch:      # 수동 실행 버튼 허용

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas FinanceDataReader openpyxl pyarrow requests

      - name: Run update script
        run: |
          python update_data.py
          python update_data_us.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update momentum data and add to archive"
          
          # ⭐ [핵심 추가] 저장하기 전에 최신 코드를 먼저 가져와서 합칩니다.
          git pull --rebase origin main
          
          git push
