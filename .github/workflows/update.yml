name: Monthly Momentum Data Auto-Update

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # ⭐ 파이썬 버전을 3.11로 업그레이드

      - name: Install dependencies
        run: |
          # ⭐ 공식 명칭인 'finance-datareader'로 수정
          pip install pandas finance-datareader openpyxl pyarrow requests 

      - name: Run update script
        run: |
          python update_data.py
          python update_data_us.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update momentum data and add to archive"
          git pull --rebase origin main
          git push
