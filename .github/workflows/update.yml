name: Momentum Data Auto-Update (Daily)

on:
  schedule:
    # ⭐ 매일 한국 시간 오전 7시 실행 (UTC 22:00)
    - cron: '0 22 * * *'  
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas finance-datareader openpyxl pyarrow requests lxml html5lib yfinance

      - name: Run DAILY update script
        run: |
          # 매일 아침 데일리 순위만 업데이트
          python update_daily.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 Daily Morning Update at 07:00 KST"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit today."
          fi
